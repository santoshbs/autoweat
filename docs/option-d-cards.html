<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoWEAT</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e8;
    --ink-1: #1c1c1c;
    --ink-2: #4a4a4a;
    --ink-3: #8a8a8a;
    --rule: #d6cdb8;
    --accent: #5d2018;
    --pos: #6b4226;
    --neg: #2c4858;
    --null: #8a8a8a;
    --font-serif: "Source Serif 4", Georgia, serif;
    --font-mono: "IBM Plex Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink-1);
    font-family: var(--font-serif);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* ─── Top bar ─────────────────────────────────────── */
  .topbar {
    padding: 24px 40px 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--rule);
  }
  .topbar-left {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .topbar-left em { font-style: italic; font-weight: 400; }
  .topbar-left .kicker {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-right: 14px;
  }
  .topbar-right {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .topbar-right a { color: inherit; text-decoration: none; margin-left: 16px; }
  .topbar-right a:hover { color: var(--accent); }

  /* ─── Card (single test full screen) ─────────────── */
  .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 80px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }

  .card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .card-meta .domain { font-weight: 600; }
  .card-meta .sep { color: var(--rule); padding: 0 8px; }
  .card-meta .legacy {
    color: var(--ink-3);
    font-style: normal;
    margin-left: 12px;
  }

  .card-observation {
    font-family: var(--font-serif);
    font-size: 44px;
    line-height: 1.12;
    letter-spacing: -0.018em;
    color: var(--ink-1);
    font-weight: 500;
    margin: 0 0 32px;
    max-width: 900px;
  }

  .card-interpretation {
    font-family: var(--font-serif);
    font-size: 19px;
    line-height: 1.6;
    color: var(--ink-2);
    font-style: italic;
    margin: 0 0 48px;
    max-width: 720px;
  }

  .card-stats {
    display: flex;
    gap: 48px;
    align-items: baseline;
    border-top: 1px solid var(--rule);
    padding-top: 28px;
    max-width: 720px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--ink-1);
  }
  .stat-value.pos { color: var(--pos); }
  .stat-value.neg { color: var(--neg); }
  .stat-value.null { color: var(--null); }

  .card-contrast {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 28px;
    max-width: 720px;
    line-height: 1.6;
  }
  .card-contrast .label {
    color: var(--ink-2);
    font-weight: 600;
    display: inline-block;
    width: 24px;
  }
  .card-contrast .vs { color: var(--rule); padding: 0 6px; }

  /* ─── Bottom nav ─────────────────────────────────── */
  .nav {
    padding: 28px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--rule);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .nav button {
    background: none;
    border: none;
    color: var(--ink-2);
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
    padding: 8px 12px;
  }
  .nav button:hover { color: var(--accent); }
  .nav button:disabled { color: var(--rule); cursor: default; }
  .nav-center {
    color: var(--ink-3);
    text-align: center;
  }
  .nav-center a { color: var(--ink-2); text-decoration: none; }
  .nav-center a:hover { color: var(--accent); }

  /* ─── Index modal ────────────────────────────────── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28, 28, 28, 0.5);
    z-index: 100;
    overflow-y: auto;
  }
  .modal-bg.visible { display: block; }
  .modal {
    background: var(--bg);
    max-width: 720px;
    margin: 64px auto;
    padding: 48px 56px;
    border: 1px solid var(--rule);
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  }
  .modal h2 {
    font-family: var(--font-serif);
    font-size: 28px;
    margin: 0 0 8px;
    font-weight: 600;
  }
  .modal .modal-sub {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--ink-3);
    margin: 0 0 28px;
  }
  .modal-close {
    float: right;
    background: none;
    border: none;
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--ink-3);
    cursor: pointer;
  }
  .modal-list { list-style: none; margin: 0; padding: 0; }
  .modal-list li {
    border-top: 1px solid var(--rule);
    padding: 14px 0;
    cursor: pointer;
  }
  .modal-list li:hover { color: var(--accent); }
  .modal-list .ml-d {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    width: 80px;
    display: inline-block;
  }
  .modal-list .ml-d.pos { color: var(--pos); }
  .modal-list .ml-d.neg { color: var(--neg); }
  .modal-list .ml-text {
    font-family: var(--font-serif);
    font-size: 14px;
    line-height: 1.45;
    color: var(--ink-1);
  }

  @media (max-width: 800px) {
    .topbar { padding: 16px 24px 12px; }
    .topbar-left { font-size: 18px; }
    .card { padding: 36px 28px; }
    .card-observation { font-size: 28px; }
    .card-interpretation { font-size: 16px; }
    .card-stats { flex-wrap: wrap; gap: 24px; }
    .stat-value { font-size: 18px; }
    .nav { padding: 20px 24px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <span class="kicker">Auto Research</span>Auto<em>WEAT</em>
    </div>
    <div class="topbar-right">
      <span><span id="m-count">—</span> tests</span>
      <a href="#" id="open-index">all tests ↗</a>
      <a href="https://github.com/santoshbs/autoweat">source</a>
    </div>
  </div>

  <main class="card" id="card">
    <p style="color: var(--ink-3); font-style: italic;">Loading…</p>
  </main>

  <div class="nav">
    <button id="prev" disabled>← previous</button>
    <span class="nav-center" id="nav-pos">— of —</span>
    <button id="next" disabled>next →</button>
  </div>

  <!-- index modal -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <button class="modal-close" id="modal-close">×</button>
      <h2>All tests</h2>
      <p class="modal-sub">Newest first. Click any to read.</p>
      <ul class="modal-list" id="modal-list"></ul>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const fmtD = d => (d >= 0 ? "+" : "") + d.toFixed(3);
const fmtP = p => p < 0.001 ? "<.001" : p.toFixed(3);
const dClass = d => Math.abs(d) < 0.2 ? "null" : (d > 0 ? "pos" : "neg");

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

let FEED = [];
let cursor = 0;

fetch("./feed.json")
  .then(r => r.json())
  .then(feed => {
    FEED = feed.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    $("m-count").textContent = FEED.length;
    if (!FEED.length) {
      $("card").innerHTML = '<p style="color: var(--ink-3); font-style: italic;">No tests yet. Start the daemon.</p>';
      return;
    }
    cursor = 0;
    renderCard();
    renderModal();
    $("prev").disabled = false;
    $("next").disabled = false;
  })
  .catch(err => {
    $("card").innerHTML = `<p style="color: var(--accent);">Failed to load feed.json: ${err.message}</p>`;
  });

function renderCard() {
  const t = FEED[cursor];
  const headline = t.observation || t.hypothesis || "";
  const body = t.interpretation || t.rationale || "";
  const isLegacy = !t.observation;
  const dKlass = dClass(t.effect_size);

  $("card").innerHTML = `
    <div class="card-meta">
      <span class="domain">${escapeHtml(t.domain)}</span>
      <span class="sep">·</span>
      <span>${fmtDate(t.timestamp)}</span>
      ${isLegacy ? '<span class="legacy">· legacy entry</span>' : ''}
    </div>
    <h1 class="card-observation">${escapeHtml(headline)}</h1>
    ${body ? `<p class="card-interpretation">${escapeHtml(body)}</p>` : ""}
    <div class="card-stats">
      <div class="stat">
        <span class="stat-label">Effect size  d</span>
        <span class="stat-value ${dKlass}">${fmtD(t.effect_size)}</span>
      </div>
      <div class="stat">
        <span class="stat-label">p-value</span>
        <span class="stat-value">${fmtP(t.p_value)}</span>
      </div>
      <div class="stat">
        <span class="stat-label">n per side</span>
        <span class="stat-value">${t.n.X}</span>
      </div>
    </div>
    <div class="card-contrast">
      <div><span class="label">X</span> ${escapeHtml(t.labels.X)} <span class="vs">vs</span> <span class="label">Y</span> ${escapeHtml(t.labels.Y)}</div>
      <div><span class="label">A</span> ${escapeHtml(t.labels.A)} <span class="vs">vs</span> <span class="label">B</span> ${escapeHtml(t.labels.B)}</div>
    </div>
  `;
  $("nav-pos").textContent = `${cursor + 1} of ${FEED.length}`;
  $("prev").disabled = cursor === 0;
  $("next").disabled = cursor === FEED.length - 1;
}

function renderModal() {
  const list = $("modal-list");
  list.innerHTML = "";
  FEED.forEach((t, i) => {
    const headline = t.observation || t.hypothesis || `${t.labels.X} vs ${t.labels.Y}`;
    const li = document.createElement("li");
    li.innerHTML = `
      <span class="ml-d ${dClass(t.effect_size)}">${fmtD(t.effect_size)}</span>
      <span class="ml-text">${escapeHtml(headline)}</span>
    `;
    li.onclick = () => {
      cursor = i;
      renderCard();
      $("modal-bg").classList.remove("visible");
    };
    list.appendChild(li);
  });
}

$("prev").onclick = () => { if (cursor > 0) { cursor--; renderCard(); } };
$("next").onclick = () => { if (cursor < FEED.length - 1) { cursor++; renderCard(); } };

document.addEventListener("keydown", e => {
  if ($("modal-bg").classList.contains("visible")) return;
  if (e.key === "ArrowLeft" && cursor > 0) { cursor--; renderCard(); }
  if (e.key === "ArrowRight" && cursor < FEED.length - 1) { cursor++; renderCard(); }
});

$("open-index").onclick = e => {
  e.preventDefault();
  $("modal-bg").classList.add("visible");
};
$("modal-close").onclick = () => $("modal-bg").classList.remove("visible");
$("modal-bg").onclick = e => { if (e.target.id === "modal-bg") $("modal-bg").classList.remove("visible"); };
</script>
</body>
</html>
